# Fly.io — API NestJS (Dockerfile en la raíz del repo).
# Ejecuta SIEMPRE desde la raíz del monorepo: cd personal-finance-os && fly deploy
# (o: pnpm deploy:fly). No corras fly deploy desde apps/ — ahí no existe fly.toml.
# 1) fly apps create personal-finance-os-api   # o cambia `app` abajo
# 2) fly postgres create --name pfo-db --region gru   # bog está deprecada; gru/iad/ord son válidas
# 3) fly postgres attach --app personal-finance-os-api pfo-db
# 4) fly secrets set CLERK_SECRET_KEY="sk_..."
# 5) fly deploy
#
# Cuotas de deuda automáticas: se aplican al abrir /debts (GET) y con cron diario UTC.
# Opcional: CRON_SECRET + POST /debts/internal/run-monthly-amortization (header x-cron-secret) desde un scheduler externo si la VM duerme.

app = "personal-finance-os-api"
# bog deprecada en Fly — no permite VMs nuevas; gru (São Paulo) suele ser la más cercana a CO
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[deploy]
  release_command = "pnpm --filter @personal-finance-os/database exec prisma migrate deploy"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
